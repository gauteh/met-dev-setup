# Install TPM
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# must be at the bottom
run '~/.tmux/plugins/tpm/tpm'

# Status line
#s tatus-right  " \"#{=22:pane_title}\" %H:%M %d-%b-%y"
wg_date="%h %d %H:%M#[default]"
wg_user_host="#(whoami)#[default]@#H"
wg_is_keys_off="#([ $(tmux show-option -qv key-table) = 'off' ] && echo '[disabled]')#[default]"
set -g status-right "\"#{=40:pane_title}\" $wg_is_keys_off $wg_user_host | $wg_date"

